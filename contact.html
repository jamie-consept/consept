<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Consept</title>
    <meta name="description" content="Get in touch to discuss your project. We work with purposeful businesses on UX design, automation, and frontend development.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 4C14.8 4 13.6667 4.13333 12.6 4.4L13.2 7.2L11 8L10 4.8C7.2 6 5 8.26667 3.6 11.2L6.4 12.8L5.2 14.4L2.4 12.8C2.13333 13.8667 2 15 2 16.2C2 16.4 2 16.6 2 16.8V17.2C2 17.4 2 17.6 2 17.8C2.13333 19 2.4 20.1333 2.8 21.2L5.6 19.6L6.8 21.2L4 22.8C5.33333 25.7333 7.6 28 10.4 29.2L11.4 26L13.6 26.8L12.8 30C13.8667 30.2667 15 30.4 16.2 30.4C22.9333 30.2667 28.2667 24.8 28.4 18.0667V16C28.4 9.26667 22.9333 3.86667 16.2 4C16.1333 4 16.0667 4 16 4Z" fill="currentColor"/>
                    <rect x="14" y="1" width="4" height="3" rx="1" fill="currentColor"/>
                    <rect x="20" y="2" width="4" height="3" rx="1" transform="rotate(30 20 2)" fill="currentColor"/>
                    <rect x="25" y="6" width="4" height="3" rx="1" transform="rotate(60 25 6)" fill="currentColor"/>
                    <rect x="28" y="12" width="4" height="3" rx="1" transform="rotate(90 28 12)" fill="currentColor"/>
                </svg>
                <span>Consept</span>
            </a>
            <span class="nav-cta-wrap">
                <span class="nav-cta-spinner"></span>
                <a href="/contact" class="nav-cta">
                    <span class="nav-cta-text">Get in Touch</span>
                    <span class="nav-cta-icon">
                        <svg width="10" height="10" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M2 7H12M12 7L7 2M12 7L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </a>
            </span>
        </div>
    </nav>

    <main>
        <section class="contact-hero">
            <div class="container">
                <h1>Let's talk</h1>
                <p class="lead">Tell us about your project and we'll get back to you within 24 hours.</p>
            </div>
        </section>

        <section class="contact-form-section">
            <div class="container-narrow">
                <form action="https://formspree.io/f/xpqkrkzl" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Jamie Smith" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="jamie@company.com" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company (optional)</label>
                        <input type="text" id="company" name="company" placeholder="Your Company Ltd">
                    </div>

                    <div class="form-group">
                        <label for="project">Tell us about your project</label>
                        <textarea id="project" name="project" rows="6" placeholder="We're looking to automate our customer onboarding process and improve our website conversion..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget range</label>
                        <select id="budget" name="budget" required>
                            <option value="">Select a range</option>
                            <option value="<£1k">Under £1k</option>
                            <option value="£1k-£3k">£1k - £3k</option>
                            <option value="£3k-£5k">£3k - £5k</option>
                            <option value="£5k+">£5k+</option>
                            <option value="not-sure">Not sure yet</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-pill">
                        <span class="btn-pill-text">Send Message</span>
                        <span class="btn-pill-icon">
                            <svg width="10" height="10" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M2 7H12M12 7L7 2M12 7L7 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Consept. Built with care.</p>
        </div>
    </footer>
</body>
</html>
