<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Consept</title>
    <meta name="description" content="Get in touch to discuss your project. I work with purposeful businesses on UX design, automation, and frontend development.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="/" class="logo">Consept</a>
            <a href="/contact.html" class="nav-link">Contact</a>
        </div>
    </nav>

    <main>
        <section class="contact-hero">
            <div class="container">
                <h1>Let's talk</h1>
                <p class="lead">Tell me about your project and I'll get back to you within 24 hours.</p>
            </div>
        </section>

        <section class="contact-form-section">
            <div class="container-narrow">
                <form action="https://formspree.io/f/xpqkrkzl" method="POST" class="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company (optional)</label>
                        <input type="text" id="company" name="company">
                    </div>

                    <div class="form-group">
                        <label for="project">Tell me about your project</label>
                        <textarea id="project" name="project" rows="6" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="budget">Budget range</label>
                        <select id="budget" name="budget" required>
                            <option value="">Select a range</option>
                            <option value="3k-5k">£3k - £5k</option>
                            <option value="5k-10k">£5k - £10k</option>
                            <option value="10k+">£10k+</option>
                            <option value="not-sure">Not sure yet</option>
                        </select>
                    </div>

                    <button type="submit" class="cta-button">Send message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Consept. Built with care.</p>
        </div>
    </footer>
</body>
</html>
